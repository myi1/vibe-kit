name: Skill self-report
description: Auto-filed by /vibe-bug when a vibe-kit skill or hook detects its own defect. Humans can use this template too — it has the same structure /vibe-bug emits.
title: "[skill: <X>] <brief description>"
labels: ["bug", "from-skill-self-report"]
body:
  - type: markdown
    attributes:
      value: |
        This template matches the JSON envelope `/vibe-bug` emits (see [docs/PATTERNS.md](https://github.com/myi1/vibe-kit/blob/main/docs/PATTERNS.md) Pattern 7 and [bin/vibe-retrofit](https://github.com/myi1/vibe-kit/blob/main/bin/vibe-retrofit) `cmd_bug_report`). If you're filing manually because /vibe-bug couldn't (no `gh` auth, mode off, etc.), filling each section in order is the path of least friction.
  - type: input
    id: skill
    attributes:
      label: Skill or hook
      description: Which vibe-kit artifact misbehaved
      placeholder: vibe-wrap | vibe-retrofit | vibe-start | vibe-upgrade | hooks/vibe-kit-userpromptsubmit.sh | bin/vibe-retrofit | etc.
    validations:
      required: true
  - type: input
    id: vibe_kit_version
    attributes:
      label: vibe-kit version
      description: Output of `vibe-retrofit version | head -1`
      placeholder: vibe-retrofit 0.8.0
    validations:
      required: true
  - type: dropdown
    id: trigger_class
    attributes:
      label: Trigger class
      description: Closest match for what kind of defect this is
      options:
        - malformed_json
        - missing_command
        - hook_garbage_output
        - doc_code_drift
        - partial_state
        - no_progress
        - other
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - blocker — user couldn't proceed at all
        - high — affected current task; user had to work around it
        - medium — quality issue; recoverable
        - low — cosmetic; functionally fine
    validations:
      required: true
  - type: textarea
    id: what_happened
    attributes:
      label: What happened
      description: 2-4 sentences, plain English. No jargon.
      placeholder: /vibe-wrap Phase 4 invoked `gbrain sources list` which hung for >30s, blocking the rest of the wrap.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected
      description: What should have happened per docs / skill instructions
      placeholder: Phase 4 should timeout after 5s and skip gbrain integration cleanly.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual
      description: What actually happened
      placeholder: Blocks indefinitely. Had to Ctrl-C the skill.
    validations:
      required: true
  - type: textarea
    id: reproducer
    attributes:
      label: Reproducer
      description: Minimal steps the maintainer can follow
      render: shell
      placeholder: |
        cd ~/some-retrofitted-repo
        /vibe-wrap
        # observe Phase 4 hang
    validations:
      required: true
  - type: textarea
    id: suggested_fix
    attributes:
      label: Suggested fix (optional)
      description: If you can identify the file:line and a 1-10 line patch, paste it as a diff block. Otherwise skip.
      render: diff
      placeholder: |
        # File: skill/vibe-wrap/SKILL.md (Phase 4 description)
        - run `gbrain sources list` to detect registration
        + run `timeout 5 gbrain sources list` to detect registration with bound
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, shell, relevant tool versions
      placeholder: |
        - macOS 14.5 (Darwin 25.4.0)
        - bash 3.2.57
        - task-master 0.x
        - gbrain 0.35.8.0
    validations:
      required: true
  - type: textarea
    id: tool_calls_tail
    attributes:
      label: Tool transcript tail (optional, redacted)
      description: Last 5 relevant tool calls leading to the failure. Redact absolute paths to `~/...` and strip any secrets.
      render: shell
  - type: input
    id: fingerprint
    attributes:
      label: Fingerprint
      description: 8-hex sha. Auto-generated by /vibe-bug. Used for dedup. Leave blank if filing manually.
      placeholder: abc12345
